name: Feature request
description: Propose a scoped capability for a future version.
title: "[feature] "
labels: ["type:feature"]
body:
  - type: dropdown
    id: phase
    attributes:
      label: Area
      options:
        - v1.x enhancement
        - docs/examples
        - storage/deployment
        - hooks/integration
        - evaluation
        - future research
        - not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow needs this?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Desired behavior and public interface.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete tests or observable outcomes.
    validations:
      required: true
