name: Feature request
description: Propose a scoped capability for a future version.
title: "[feature] "
labels: ["type:feature"]
body:
  - type: dropdown
    id: phase
    attributes:
      label: Target version
      options:
        - v0.4 persistence/import/export
        - v0.5 graph summary/hooks
        - v0.6 HTTP daemon/counterfactual
        - v0.7 reasoning expansion
        - later
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow needs this?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Desired behavior and public interface.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete tests or observable outcomes.
    validations:
      required: true
