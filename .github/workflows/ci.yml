name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: Format and lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src/nesy_reasoning_mcp

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Test
        run: uv run pytest

  smoke:
    name: Smoke checks
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --locked

      - name: Validate example MCP config
        run: |
          uv run python -m json.tool examples/mcp-config.json > /dev/null
          uv run python -m json.tool examples/nesy-config.json > /dev/null
          uv run python -m json.tool examples/claude-hooks.json > /dev/null
          uv run python -m json.tool examples/internal-test/nesy-config.json > /dev/null
          uv run python -m json.tool examples/internal-test/mcp-stdio-config.json > /dev/null
          uv run python -m json.tool examples/internal-test/claude-hooks.json > /dev/null
          uv run python -m json.tool benchmarks/fixtures/core.json > /dev/null
          uv run python -m json.tool benchmarks/fixtures/core.schema.json > /dev/null
          uv run python -m py_compile examples/hooks/nesy_context_inject.py examples/hooks/nesy_stop_check.py
          uv run python -m py_compile examples/internal-test/smoke.py
          bash -n examples/internal-test/hook-pretooluse.sh
          bash -n examples/internal-test/hook-stop.sh
          bash -n examples/internal-test/run-http.sh
          env PYTHONPATH=src uv run python examples/internal-test/smoke.py

      - name: Offline eval smoke
        run: |
          env PYTHONPATH=src uv run nesy-reasoning-mcp eval run --fixture benchmarks/fixtures/core.json --format json > /tmp/nesy-eval.json
          uv run python -m json.tool /tmp/nesy-eval.json > /dev/null
          env PYTHONPATH=src uv run nesy-reasoning-mcp eval agent --fixture benchmarks/fixtures/core.json --format json > /tmp/nesy-agent-eval.json
          uv run python -m json.tool /tmp/nesy-agent-eval.json > /dev/null

      - name: Stdio server exits cleanly on EOF
        run: printf '' | env PYTHONPATH=src uv run nesy-reasoning-mcp --transport stdio

      - name: MCP client smoke
        env:
          PYTHONPATH: src
        run: |
          uv run python - <<'PY'
          import anyio
          import json
          from pathlib import Path
          from mcp import ClientSession
          from mcp.client.stdio import StdioServerParameters, stdio_client

          async def main():
              params = StdioServerParameters(
                  command="uv",
                  args=["run", "nesy-reasoning-mcp", "--transport", "stdio"],
                  cwd=".",
                  env={"PYTHONPATH": "src"},
              )
              async with stdio_client(params) as (read, write):
                  async with ClientSession(read, write) as session:
                      await session.initialize()
                      tools = await session.list_tools()
                      tool_names = [tool.name for tool in tools.tools]
                      assert len(tool_names) == 12
                      assert "nesy.summarize_graph" in tool_names
                      assert "nesy.counterfactual" in tool_names
                      assert "nesy.reason_over_relations" in tool_names
                      await session.call_tool(
                          "nesy.assert_exclusive",
                          {
                              "groups": [
                                  {
                                      "group_id": "state",
                                      "members": ["B", "C"],
                                  }
                              ]
                          },
                      )
                      await session.call_tool(
                          "nesy.assert_relations",
                          {
                              "relations": [
                                  {
                                      "source": "A",
                                      "target": "B",
                                      "relation_type": "sufficient",
                                  },
                                  {
                                      "source": "A",
                                      "target": "C",
                                      "relation_type": "sufficient",
                                  },
                              ],
                              "check_contradictions": False,
                          },
                      )
                      checked = await session.call_tool("nesy.check_contradictions", {})
                      assert checked.structuredContent["has_contradictions"] is True
                      assert checked.structuredContent["contradictions"][0]["type"] == "exclusive_targets"
                      exported = await session.call_tool("nesy.export_relations", {"destination": "inline"})
                      assert exported.structuredContent["relation_count"] == 2
                      loaded = await session.call_tool(
                          "nesy.load_relations",
                          {
                              "source_type": "inline",
                              "data": exported.structuredContent["data"],
                              "validate_only": True,
                              "check_contradictions": False,
                          },
                      )
                      assert loaded.structuredContent["loaded_relations"] == 2
                      summary = await session.call_tool(
                          "nesy.summarize_graph",
                          {"focus_terms": ["A"], "include_exclusives": True},
                      )
                      assert "A sufficient B" in summary.structuredContent["summary"]
                      counterfactual = await session.call_tool(
                          "nesy.counterfactual",
                          {"if_not": "A", "targets": ["B"]},
                      )
                      assert counterfactual.structuredContent["possibly_blocked"][0]["target"] == "B"
                      await session.call_tool(
                          "nesy.load_relations",
                          {
                              "source_type": "inline",
                              "data": {
                                  "relations": [
                                      {
                                          "source": "D",
                                          "target": "B",
                                          "relation_type": "sufficient",
                                      }
                                  ],
                                  "independence_records": [
                                      {"left": "D", "right": "A"}
                                  ],
                              },
                              "check_contradictions": False,
                          },
                      )
                      classified = await session.call_tool(
                          "nesy.classify",
                          {"source": "A", "target": "B"},
                      )
                      assert classified.structuredContent["necessity_status"]["status"] == "proven_not_necessary"

                      resource_path = Path("resource-uri-smoke.json").resolve()
                      resource_path.write_text(
                          json.dumps(
                              {
                                  "relations": [
                                      {
                                          "source": "R",
                                          "target": "S",
                                          "relation_type": "sufficient",
                                      }
                                  ]
                              }
                          ),
                          encoding="utf-8",
                      )
                      try:
                          loaded_resource = await session.call_tool(
                              "nesy.load_relations",
                              {
                                  "source_type": "resource_uri",
                                  "resource_uri": resource_path.as_uri(),
                                  "validate_only": True,
                                  "check_contradictions": False,
                              },
                          )
                          assert loaded_resource.structuredContent["loaded_relations"] == 1
                      finally:
                          resource_path.unlink(missing_ok=True)

          anyio.run(main)
          PY

      - name: HTTP MCP client smoke
        env:
          PYTHONPATH: src
        run: |
          uv run python - <<'PY'
          import anyio
          import os
          import socket
          import subprocess
          import sys
          import time

          import httpx
          from mcp import ClientSession
          from mcp.client.streamable_http import streamablehttp_client

          def free_port():
              with socket.socket() as sock:
                  sock.bind(("127.0.0.1", 0))
                  return sock.getsockname()[1]

          async def main():
              port = free_port()
              env = os.environ.copy()
              for key in list(env):
                  if key.upper().endswith("_PROXY"):
                      env.pop(key, None)
              env.update(
                  {
                      "NO_PROXY": "127.0.0.1,localhost",
                      "PYTHONPATH": "src",
                      "NESY_LOCAL_TOKEN": "ci-token",
                      "NESY_HTTP_PORT": str(port),
                      "NESY_HTTP_RATE_LIMIT_PER_MINUTE": "1000",
                  }
              )
              proc = subprocess.Popen(
                  [sys.executable, "-m", "nesy_reasoning_mcp", "--transport", "http"],
                  env=env,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )
              try:
                  base_url = f"http://127.0.0.1:{port}"
                  for _ in range(100):
                      if proc.poll() is not None:
                          raise RuntimeError(proc.stderr.read())
                      try:
                          response = httpx.get(
                              f"{base_url}/healthz",
                              headers={"Authorization": "Bearer ci-token"},
                              timeout=0.2,
                              trust_env=False,
                          )
                          if response.status_code == 200:
                              break
                      except httpx.HTTPError:
                          pass
                      time.sleep(0.05)
                  else:
                      raise RuntimeError("HTTP server did not become ready")

                  for key in list(os.environ):
                      if key.upper().endswith("_PROXY"):
                          os.environ.pop(key, None)
                  os.environ["NO_PROXY"] = "127.0.0.1,localhost"
                  async with streamablehttp_client(
                      f"{base_url}/mcp",
                      headers={"Authorization": "Bearer ci-token"},
                      timeout=5,
                      sse_read_timeout=5,
                  ) as (read, write, _session_id):
                      async with ClientSession(read, write) as session:
                          await session.initialize()
                          tools = await session.list_tools()
                          tool_names = [tool.name for tool in tools.tools]
                          assert len(tool_names) == 12
                          assert "nesy.reason_over_relations" in tool_names
                          await session.call_tool(
                              "nesy.assert_relations",
                              {
                                  "relations": [
                                      {
                                          "source": "A",
                                          "target": "B",
                                          "relation_type": "sufficient",
                                      }
                                  ],
                                  "check_contradictions": False,
                              },
                          )
                          classified = await session.call_tool(
                              "nesy.classify",
                              {"source": "A", "target": "B"},
                          )
                          assert classified.structuredContent["classification"] == "sufficient"
              finally:
                  proc.terminate()
                  try:
                      proc.wait(timeout=5)
                  except subprocess.TimeoutExpired:
                      proc.kill()
                      proc.wait(timeout=5)
                  assert proc.stdout.read() == ""

          anyio.run(main)
          PY

      - name: Persistence smoke
        env:
          PYTHONPATH: src
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory

          from nesy_reasoning_mcp.config import NesyConfig, StorageConfig
          from nesy_reasoning_mcp.schemas import RelationInput, RelationType
          from nesy_reasoning_mcp.store import JsonRelationStore, SqliteRelationStore

          with TemporaryDirectory() as tmp:
              base = Path(tmp)
              sqlite_config = NesyConfig(
                  storage=StorageConfig(
                      backend="sqlite",
                      sqlite_path=str(base / "nesy.db"),
                  )
              )
              sqlite_store = SqliteRelationStore(sqlite_config)
              sqlite_store.assert_relations([
                  RelationInput(source="A", target="B", relation_type=RelationType.SUFFICIENT)
              ])
              assert SqliteRelationStore(sqlite_config).list_relations()[0].target == "B"

              json_config = NesyConfig(
                  storage=StorageConfig(
                      backend="json",
                      json_path=str(base / "relations.json"),
                  )
              )
              json_store = JsonRelationStore(json_config)
              json_store.assert_relations([
                  RelationInput(source="C", target="D", relation_type=RelationType.SUFFICIENT)
              ])
              assert JsonRelationStore(json_config).list_relations()[0].target == "D"
          PY

      - name: Hook CLI smoke
        env:
          PYTHONPATH: src
        run: |
          tmpdir="$(mktemp -d)"
          config="$tmpdir/config.json"
          db="$tmpdir/nesy.db"
          cat > "$config" <<EOF
          {"storage":{"backend":"sqlite","sqlite_path":"$db"}}
          EOF
          NESY_CONFIG="$config" uv run python - <<'PY'
          from nesy_reasoning_mcp.config import load_config
          from nesy_reasoning_mcp.schemas import ExclusiveGroupInput, RelationInput, RelationType
          from nesy_reasoning_mcp.store import create_relation_store

          store = create_relation_store(load_config())
          store.assert_relations([
              RelationInput(source="降价", target="销量增加", relation_type=RelationType.SUFFICIENT)
          ])
          store.assert_exclusive([ExclusiveGroupInput(group_id="state", members=["B", "C"])])
          PY
          pre="$(printf '{"tool_name":"Bash","tool_input":{"command":"降价"},"cwd":"/tmp/project"}' | NESY_CONFIG="$config" uv run nesy-reasoning-mcp hook pretooluse)"
          printf '%s' "$pre" | uv run python -c 'import json,sys; data=json.load(sys.stdin); ctx=data["hookSpecificOutput"]["additionalContext"]; assert "not executable instructions" in ctx; assert "降价 sufficient 销量增加" in ctx'
          payload='{"stop_hook_active":false,"last_assistant_message":"NESY_FACTS:\n[{\"source\":\"A\",\"target\":\"B\",\"relation_type\":\"sufficient\"},{\"source\":\"A\",\"target\":\"C\",\"relation_type\":\"sufficient\"}]"}'
          stop="$(printf '%s' "$payload" | NESY_CONFIG="$config" uv run nesy-reasoning-mcp hook stop)"
          printf '%s' "$stop" | uv run python -c 'import json,sys; data=json.load(sys.stdin); assert data["decision"] == "block"'
          rm -rf "$tmpdir"

      - name: Build package
        run: rm -rf dist && uv build

      - name: Wheel install smoke
        run: |
          python -m venv .wheel-venv
          . .wheel-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          nesy-reasoning-mcp --help

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package
          path: |
            dist/*.whl
            dist/*.tar.gz
