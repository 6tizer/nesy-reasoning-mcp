name: Bug report
description: Report incorrect behavior, crash, or regression.
title: "[bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal tool calls, command output, or test case.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.3.0"
    validations:
      required: false
